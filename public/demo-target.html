<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo checkout — Lumina sample app</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: min(100%, 320px);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #fff;
      box-shadow: 0 8px 24px -12px rgb(15 23 42 / 25%);
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.15rem; }
    p { margin: 0 0 1rem; font-size: 0.85rem; color: #64748b; }
    label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 0.85rem;
      font: inherit;
    }
    button {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 8px;
      background: #0f172a;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Acme checkout</h1>
    <p>Sample app Lumina tests against in the live demo.</p>
    <form id="checkout-form" action="#" onsubmit="return false;">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@company.com" />
      <label for="promo">Promo code</label>
      <input id="promo" type="text" placeholder="SAVE10" />
      <button type="submit" id="apply-btn">Apply discount</button>
    </form>
    <p id="status" hidden role="status" style="margin-top:1rem;font-size:0.85rem;color:#15803d;font-weight:600;"></p>
  </div>
  <script>
    document.getElementById("checkout-form").addEventListener("submit", function () {
      var status = document.getElementById("status");
      status.hidden = false;
      status.textContent = "Discount applied — total updated.";
    });
  </script>
</body>
</html>
